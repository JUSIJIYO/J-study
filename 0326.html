<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

</head>

<body>

    <!-- // 연습1) 아래 변수에 저장된 값을 <div> 태그로 화면에 표시하세요.
    const name = 'Tom'; -->


    <div id="root1">
        <script type="text/babel">
            const name = 'Tom';

            const divName = <div>{name}</div>
            ReactDOM.createRoot(document.getElementById('root1')).render(divName);
        </script>
        </script>
    </div>

    <hr>
    <!-- // 연습2) 아래 객체에 저장된 값 중 model 속성만 <div> 태그로 화면에 표시하세요.
    const car = {
      model: 'sorento',
      price: 4000,
    } -->
    <div id="root2">
        <script type="text/babel">
            const car = {
                model: 'sorento',
                price: 4000,
            }
            const carName = <div> {car.model} </div>

            ReactDOM.createRoot(document.getElementById('root2')).render(carName);
        </script>
    </div>

    <hr>
    <!-- 
    // 연습3) 아래 score 값이 60 이상이면 "합격", 아니면 "불합격"을 <div> 태그로 화면에 표시하세요.
    const score = 80; -->
    <div id="root3">
        <script type="text/babel">
            const score = 80;

            const result = score >= 60
                ? <span>합격</span>
                : <span>불합격</span>

            const resultScore = <div>{result}</div>
            ReactDOM.createRoot(document.getElementById('root3')).render(resultScore);
        </script>
    </div>
    <hr>
    <!-- 
    // 연습4) 아래 변수에 저장된 값이 없으면 "값없음", 값이 있으면 저장된 값을 <div> 태그로 화면에 표시하세요.
    let value;

-->

    <div id="root4">
        <script type="text/babel">
            let value;
            let noValue = value === undefined
                ? <span>값없음</span>
                : <span>값있음</span>

            const resultValue = <div>{noValue}</div>
            ReactDOM.createRoot(document.getElementById('root4')).render(resultValue);

        </script>
    </div>
    <hr>
    <!-- // 연습5) 아래 color 값이 "r"이면 "red", "g"이면 "green", "b"이면 "blue" 배경색을 <div> 태그에 적용해 화면에 표시하세요.
    //       (100 x 100 크기)
    const color = 'r';  -->

    <div id="root5">
        <script type="text/babel">
            const color = 'r';
            const red = {
                width: 100,
                height: 100,
                backgroundColor: 'red'
            };
            const green = {
                width: 100,
                height: 100,
                backgroundColor: 'green'
            };
            const blue = {
                width: 100,
                height: 100,
                backgroundColor: 'blue'
            };

            let colorBox;

            if(color==='r'){
                colorBox= <div style={red}></div>;
            }
            else if(color==='g'){
                colorBox=  <div style={green}></div>;
            } else{
                colorBox = <div style={blue}></div>;
            }

            ReactDOM.createRoot(document.getElementById('root5')).render(colorBox);
        </script>
    </div>
</body>

</html>
